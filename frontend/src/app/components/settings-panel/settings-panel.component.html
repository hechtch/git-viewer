<div class="panel-overlay" (click)="close.emit()"></div>

<div class="panel">
  <div class="panel-header">
    <h2>Settings</h2>
    <button class="close-btn" (click)="close.emit()" title="Close">&#x2715;</button>
  </div>

  <div class="panel-body">
    <!-- Watermarks section -->
    <div class="section">
      <div class="section-title">Watermarks</div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Show watermarks</div>
        </div>
        <input type="checkbox" [(ngModel)]="wmEnabled"/>
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Min. commits to show</div>
          <div class="setting-hint">Per period in viewport</div>
        </div>
        <input type="number" [(ngModel)]="wmMinCommits" min="1" max="20" class="number-input"/>
      </div>

      <div class="setting-row">
        <div class="setting-label">Date format</div>
        <div class="btn-group">
          <button class="fmt-btn" [class.active]="wmDateFormat === 'short'" (click)="setDateFormat('short')">Short</button>
          <button class="fmt-btn" [class.active]="wmDateFormat === 'medium'" (click)="setDateFormat('medium')">Med</button>
          <button class="fmt-btn" [class.active]="wmDateFormat === 'long'" (click)="setDateFormat('long')">Long</button>
        </div>
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Font size</div>
          <div class="setting-hint">{{ toPercent(wmFontScale) }}%</div>
        </div>
        <input type="range" [(ngModel)]="wmFontScale" min="0.1" max="2.0" step="0.1" class="range-input"/>
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Label opacity</div>
          <div class="setting-hint">{{ toPercent(wmTextOpacity) }}%</div>
        </div>
        <input type="range" [(ngModel)]="wmTextOpacity" min="0.01" max="0.20" step="0.01" class="range-input"/>
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Rule opacity</div>
          <div class="setting-hint">{{ toPercent(wmRuleOpacity) }}%</div>
        </div>
        <input type="range" [(ngModel)]="wmRuleOpacity" min="0.01" max="0.30" step="0.01" class="range-input"/>
      </div>
    </div>
  </div>
</div>
