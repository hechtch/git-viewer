<div class="toast-bar">
  <div class="toast" *ngIf="toastVisible">
    {{ toastMessage }}
  </div>
</div>
<div class="graph-container">
  <!-- Pinned lane labels on the left -->
  <div class="lane-labels" [style.height.px]="svgHeight">
    <div
      *ngFor="let lane of laneLabels"
      class="lane-label-row"
      [class.lane-label-row-selected]="lane.col === selectedCol"
      [style.top.px]="nodeY(lane.col) - LANE_HEIGHT / 2"
      [style.height.px]="LANE_HEIGHT">
      <span
        class="lane-label"
        [class.lane-label-selected]="lane.col === selectedCol"
        [style.color]="lane.color">
        {{ lane.name }}
      </span>
      <span *ngIf="laneStatus.get(lane.col) as s"
        class="lane-status-badge"
        [class.lane-status-merged]="s.isMerged"
        [class.lane-status-ahead]="!s.isMerged">
        {{ s.label }}
      </span>
    </div>
  </div>

  <!-- Horizontally scrollable graph -->
  <div class="graph-scroll">
    <svg
      [attr.width]="svgWidth"
      [attr.height]="svgHeight"
      class="graph-svg">

      <!-- Horizontal lane row targets (hover highlight) -->
      <g class="lane-rows">
        <rect
          *ngFor="let lane of laneLabels"
          x="0"
          [attr.y]="nodeY(lane.col) - LANE_HEIGHT / 2"
          [attr.width]="svgWidth"
          [attr.height]="LANE_HEIGHT"
          fill="transparent"
          class="lane-hit-target"
          [class.lane-selected]="lane.col === selectedCol"
        />
      </g>

      <!-- Dashed lane guide lines -->
      <g class="lane-guides">
        <line
          *ngFor="let lane of laneLabels"
          x1="0"
          [attr.y1]="nodeY(lane.col)"
          [attr.x2]="svgWidth"
          [attr.y2]="nodeY(lane.col)"
          stroke="#313244"
          stroke-width="1"
          stroke-dasharray="4,4"
        />
      </g>

      <!-- Edges -->
      <g class="edges">
        <path
          *ngFor="let edge of allEdges"
          [attr.d]="edge.path"
          [attr.stroke]="edge.color"
          stroke-width="2"
          fill="none"
        />
      </g>

      <!-- Nodes -->
      <g *ngFor="let node of renderNodes">
        <!-- Vertical column hit target -->
        <rect
          [attr.x]="nodeX(node.row) - COMMIT_SPACING / 2"
          y="0"
          [attr.width]="COMMIT_SPACING"
          [attr.height]="svgHeight"
          fill="transparent"
          class="hit-target"
          [class.selected]="node.entry.sha === selectedSha"
          (click)="onCommitClick(node.entry.sha)">
          <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
        </rect>

        <!-- Ref badges above node -->
        <g *ngFor="let badge of node.badges; let i = index">
          <rect
            [attr.x]="nodeX(node.row) - badge.width / 2"
            [attr.y]="nodeY(node.col) - 26 - i * 20"
            [attr.width]="badge.width"
            height="16"
            rx="3"
            [attr.fill]="badge.color"
            [attr.stroke]="badge.borderColor"
            stroke-width="1"
          />
          <text
            [attr.x]="nodeX(node.row)"
            [attr.y]="nodeY(node.col) - 14 - i * 20"
            class="ref-text"
            text-anchor="middle"
            [attr.fill]="badge.textColor">
            {{ badge.label }}
          </text>
        </g>

        <!-- Node circle -->
        <circle
          [attr.cx]="nodeX(node.row)"
          [attr.cy]="nodeY(node.col)"
          [attr.r]="NODE_RADIUS"
          [attr.fill]="node.color"
          [attr.stroke]="node.color"
          stroke-width="2">
          <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
        </circle>

        <!-- Short hash below node -->
        <text
          [attr.x]="nodeX(node.row)"
          [attr.y]="nodeY(node.col) + 18"
          class="hash-label"
          text-anchor="middle">
          {{ node.entry.short }}
        </text>

      </g>
    </svg>
  </div>
</div>
