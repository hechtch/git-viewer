<div class="graph-container" [class.mode-td]="!isHorizontal" [class.show-hover]="showMouseHover" (mousemove)="onMouseMove()">
  <div class="toast-bar">
    @if (toastVisible) {
      <div class="toast"
           [class.toast-prominent]="toastProminent"
           [style.position]="toastProminent ? 'fixed' : null"
           [style.left]="toastProminent ? toastCx + 'px' : null"
           [style.top]="toastProminent ? toastCy + 'px' : null"
           [style.transform]="toastProminent ? 'translate(-50%, -50%)' : null">
        {{ toastMessage }}
      </div>
    }
  </div>


  <!-- LR mode: pinned lane labels on the left -->
  @if (isHorizontal) {
    <div class="lane-labels" [style.height.px]="svgHeight * zoom">
      @for (lane of laneLabels; track lane) {
        <div
          class="lane-label-row"
          [class.lane-label-row-selected]="lane.col === selectedCol"
          [class.lane-label-row-hidden]="!showMerged && lane.merged"
          [class.lane-label-row-merged]="showMerged && lane.merged"
          [style.top.px]="(lanePrimaryPos(lane.col) - LANE_HEIGHT / 2) * zoom"
          [style.height.px]="LANE_HEIGHT * zoom">
          <span
            class="lane-label"
            [class.lane-label-selected]="lane.col === selectedCol"
            [style.color]="lane.color">
            {{ lane.name }}
          </span>
          @if (lane.isCurrent) {
            <span class="lane-head-badge">HEAD</span>
          }
          @if (laneStatus.get(lane.col); as s) {
            <span
              class="lane-status-badge"
              [class.lane-status-merged]="s.isMerged"
              [class.lane-status-ahead]="!s.isMerged"
              [attr.data-tooltip]="s.isMerged ? null : s.tooltip">
              {{ s.label }}
            </span>
          }
        </div>
      }
    </div>
  }

  <!-- Horizontally scrollable graph -->
  <div class="graph-scroll" #graphScroll (wheel)="onWheel($event)">
    <svg
      [attr.width]="svgWidth * zoom"
      [attr.height]="svgHeight * zoom"
      [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
      class="graph-svg">

      <!-- Lane background rows (LR) or columns (TD) -->
      <g class="lane-rows">
        @for (lane of laneLabels; track lane) {
          @if (isHorizontal) {
            <rect
              x="0"
              [attr.y]="lanePrimaryPos(lane.col) - LANE_HEIGHT / 2"
              [attr.width]="svgWidth"
              [attr.height]="LANE_HEIGHT"
              fill="transparent"
              class="lane-hit-target"
              [class.lane-selected]="lane.col === selectedCol"
              [class.lane-merged-hidden]="!showMerged && lane.merged"
              />
          } @else {
            <rect
              [attr.x]="lanePrimaryPos(lane.col) - LANE_HEIGHT / 2"
              y="0"
              [attr.width]="LANE_HEIGHT"
              [attr.height]="svgHeight"
              fill="transparent"
              class="lane-hit-target"
              [class.lane-selected]="lane.col === selectedCol"
              [class.lane-merged-hidden]="!showMerged && lane.merged"
              />
          }
        }
      </g>

      <!-- Lane guide lines -->
      <g class="lane-guides">
        @for (lane of laneLabels; track lane) {
          @if (isHorizontal) {
            <line
              x1="0" [attr.y1]="lanePrimaryPos(lane.col)"
              [attr.x2]="svgWidth" [attr.y2]="lanePrimaryPos(lane.col)"
              stroke="#313244" stroke-width="1" stroke-dasharray="4,4"
              [style.display]="!showMerged && mergedCols.has(lane.col) ? 'none' : null"
              [class.merged-dim]="showMerged && mergedCols.has(lane.col)"/>
          } @else {
            <line
              [attr.x1]="lanePrimaryPos(lane.col)" y1="0"
              [attr.x2]="lanePrimaryPos(lane.col)" [attr.y2]="svgHeight"
              stroke="#313244" stroke-width="1" stroke-dasharray="4,4"
              [style.display]="!showMerged && mergedCols.has(lane.col) ? 'none' : null"
              [class.merged-dim]="showMerged && mergedCols.has(lane.col)"/>
          }
        }
      </g>

      <!-- Edges -->
      <g class="edges">
        @for (edge of allEdges; track edge) {
          <path [attr.d]="edge.path" [attr.stroke]="edge.color" stroke-width="2" fill="none"
                [style.display]="!showMerged && edge.merged ? 'none' : null"
                [class.merged-dim]="showMerged && edge.merged"/>
        }
      </g>

      <!-- Nodes -->
      @for (node of renderNodes; track node) {
        <g [style.display]="!showMerged && mergedCols.has(node.col) ? 'none' : null"
           [class.merged-dim]="showMerged && mergedCols.has(node.col)">
          <!-- Hit target: vertical stripe (LR) or horizontal stripe (TD) -->
          @if (isHorizontal) {
            <rect
              [attr.x]="nodeX(node.row, node.col) - COMMIT_SPACING / 2"
              y="0"
              [attr.width]="COMMIT_SPACING"
              [attr.height]="svgHeight"
              fill="transparent"
              class="hit-target"
              [class.selected]="node.entry.sha === selectedSha"
              (click)="onCommitClick(node.entry.sha)">
              <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
            </rect>
          } @else {
            <rect
              x="0"
              [attr.y]="nodeY(node.row, node.col) - COMMIT_SPACING / 2"
              [attr.width]="svgWidth"
              [attr.height]="COMMIT_SPACING"
              fill="transparent"
              class="hit-target"
              [class.selected]="node.entry.sha === selectedSha"
              (click)="onCommitClick(node.entry.sha)">
              <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
            </rect>
          }

          <!-- Ref badges -->
          @for (badge of node.badges; track badge; let i = $index) {
            <g>
              <rect
                [attr.x]="badgeRectX(node.row, node.col, badge.width, i)"
                [attr.y]="badgeRectY(node.row, node.col, i)"
                [attr.width]="badge.width"
                height="16"
                rx="3"
                [attr.fill]="badge.color"
                [attr.stroke]="badge.borderColor"
                stroke-width="1"/>
              <text
                [attr.x]="badgeTextX(node.row, node.col, i)"
                [attr.y]="badgeTextY(node.row, node.col, i)"
                class="ref-text"
                [attr.text-anchor]="badgeTextAnchor"
                [attr.fill]="badge.textColor">
                {{ badge.label }}
              </text>
            </g>
          }

          <!-- Node circle -->
          <circle
            [attr.cx]="nodeX(node.row, node.col)"
            [attr.cy]="nodeY(node.row, node.col)"
            [attr.r]="NODE_RADIUS"
            [attr.fill]="node.color"
            [attr.stroke]="node.color"
            stroke-width="2">
            <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
          </circle>

          <!-- Short hash -->
          <text
            [attr.x]="hashLabelX(node.row, node.col)"
            [attr.y]="hashLabelY(node.row, node.col)"
            class="hash-label"
            [attr.text-anchor]="hashTextAnchor">
            {{ node.entry.short }}
          </text>
        </g>
      }
    </svg>
  </div>
</div>
