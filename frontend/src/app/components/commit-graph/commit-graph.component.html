<div class="toast-bar">
  @if (toastVisible) {
    <div class="toast">
      {{ toastMessage }}
    </div>
  }
</div>
<div class="graph-container" [class.show-hover]="showMouseHover" (mousemove)="onMouseMove()">
  <!-- Pinned lane labels on the left -->
  <div class="lane-labels" [style.height.px]="svgHeight * zoom">
    @for (lane of laneLabels; track lane) {
      <div
        class="lane-label-row"
        [class.lane-label-row-selected]="lane.col === selectedCol"
        [class.lane-label-row-hidden]="!showMerged && lane.merged"
        [style.top.px]="(nodeY(lane.col) - LANE_HEIGHT / 2) * zoom"
        [style.height.px]="LANE_HEIGHT * zoom">
        <span
          class="lane-label"
          [class.lane-label-selected]="lane.col === selectedCol"
          [style.color]="lane.color">
          {{ lane.name }}
        </span>
        @if (laneStatus.get(lane.col); as s) {
          <span
            class="lane-status-badge"
            [class.lane-status-merged]="s.isMerged"
            [class.lane-status-ahead]="!s.isMerged">
            {{ s.label }}
          </span>
        }
      </div>
    }
  </div>

  <!-- Horizontally scrollable graph -->
  <div class="graph-scroll" #graphScroll (wheel)="onWheel($event)" [style.cursor]="'default'">
    <svg
      [attr.width]="svgWidth * zoom"
      [attr.height]="svgHeight * zoom"
      [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
      class="graph-svg">

      <!-- Horizontal lane row targets (hover highlight) -->
      <g class="lane-rows">
        @for (lane of laneLabels; track lane) {
          <rect
            x="0"
            [attr.y]="nodeY(lane.col) - LANE_HEIGHT / 2"
            [attr.width]="svgWidth"
            [attr.height]="LANE_HEIGHT"
            fill="transparent"
            class="lane-hit-target"
            [class.lane-selected]="lane.col === selectedCol"
            [class.lane-merged-hidden]="!showMerged && lane.merged"
            />
        }
      </g>

      <!-- Dashed lane guide lines -->
      <g class="lane-guides">
        @for (lane of laneLabels; track lane) {
          <line
            x1="0"
            [attr.y1]="nodeY(lane.col)"
            [attr.x2]="svgWidth"
            [attr.y2]="nodeY(lane.col)"
            stroke="#313244"
            stroke-width="1"
            stroke-dasharray="4,4"
            />
        }
      </g>

      <!-- Edges -->
      <g class="edges">
        @for (edge of allEdges; track edge) {
          <path
            [attr.d]="edge.path"
            [attr.stroke]="edge.color"
            stroke-width="2"
            fill="none"
            />
        }
      </g>

      <!-- Nodes -->
      @for (node of renderNodes; track node) {
        <g>
          <!-- Vertical column hit target -->
          <rect
            [attr.x]="nodeX(node.row) - COMMIT_SPACING / 2"
            y="0"
            [attr.width]="COMMIT_SPACING"
            [attr.height]="svgHeight"
            fill="transparent"
            class="hit-target"
            [class.selected]="node.entry.sha === selectedSha"
            (click)="onCommitClick(node.entry.sha)">
            <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
          </rect>
          <!-- Ref badges above node -->
          @for (badge of node.badges; track badge; let i = $index) {
            <g>
              <rect
                [attr.x]="nodeX(node.row) - badge.width / 2"
                [attr.y]="nodeY(node.col) - 26 - i * 20"
                [attr.width]="badge.width"
                height="16"
                rx="3"
                [attr.fill]="badge.color"
                [attr.stroke]="badge.borderColor"
                stroke-width="1"
                />
              <text
                [attr.x]="nodeX(node.row)"
                [attr.y]="nodeY(node.col) - 14 - i * 20"
                class="ref-text"
                text-anchor="middle"
                [attr.fill]="badge.textColor">
                {{ badge.label }}
              </text>
            </g>
          }
          <!-- Node circle -->
          <circle
            [attr.cx]="nodeX(node.row)"
            [attr.cy]="nodeY(node.col)"
            [attr.r]="NODE_RADIUS"
            [attr.fill]="node.color"
            [attr.stroke]="node.color"
            stroke-width="2">
            <title>{{ node.entry.short }} — {{ node.entry.message }}</title>
          </circle>
          <!-- Short hash below node -->
          <text
            [attr.x]="nodeX(node.row)"
            [attr.y]="nodeY(node.col) + 18"
            class="hash-label"
            text-anchor="middle">
            {{ node.entry.short }}
          </text>
        </g>
      }
    </svg>
  </div>
</div>
