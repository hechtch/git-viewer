<div class="overlay">
  <div class="dialog">
    <div class="dialog-header">
      <h2>Open Repository</h2>
      @if (canCancel) {
        <button class="close-btn" (click)="cancel()">✕</button>
      }
    </div>

    <!-- Native OS folder picker -->
    <div class="pick-section">
      <button class="pick-btn" (click)="pickFolder()" [disabled]="picking || loading">
        <span class="pick-icon">📂</span>
        {{ picking ? 'Opening...' : 'Browse for folder...' }}
      </button>
    </div>

    @if (recentRepos.length > 0) {
      <div class="divider"><span>recent</span></div>

      <ul class="repo-list">
        @for (repo of recentRepos; track repo.path) {
          <li
            class="repo-item"
            [class.loading]="loadingPath === repo.path"
            [class.disabled]="(loadingPath !== null || loading) && loadingPath !== repo.path"
            (click)="openRecent(repo)">
            <span class="repo-icon">📁</span>
            <div class="repo-info">
              <span class="repo-name">{{ repo.name }}</span>
              <span class="repo-path">{{ repo.path }}</span>
            </div>
            <span class="repo-date">{{ formatDate(repo.lastOpened) }}</span>
            @if (loadingPath === repo.path) {
              <span class="spinner"></span>
            }
          </li>
        }
      </ul>
    }

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    @if (canCancel) {
      <div class="actions">
        <button class="secondary" (click)="cancel()">Cancel</button>
      </div>
    }
  </div>
</div>
