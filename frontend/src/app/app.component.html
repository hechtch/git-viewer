@if (showSelector || repoPath === null) {
  <app-repo-selector
    [canCancel]="repoPath !== null"
    [initialPath]="repoPath || ''"
    (repoOpened)="onRepoOpened($event)">
  </app-repo-selector>
}

@if (repoPath !== null) {
  <div class="app-shell">
    <div class="app-header">
      <span class="repo-name">{{ repoName }}</span>
      <span class="repo-path">{{ repoPath }}</span>
      <button class="change-repo-btn" (click)="openSelector()">Change repo</button>
    </div>
    <app-repo-status (refreshed)="onRefreshed()"></app-repo-status>
    <div class="main-layout">
      <aside class="sidebar">
        <app-branch-list [repoPath]="repoPath" [refreshTick]="refreshTick" (branchSelected)="onBranchSelected($event)"></app-branch-list>
      </aside>
      <main class="content" [style.--text-zoom]="contentZoom">
        <div class="tab-bar">
          <button [class.active]="activeTab === 'timeline'" (click)="activeTab = 'timeline'">Timeline</button>
          <button [class.active]="activeTab === 'commits'" (click)="activeTab = 'commits'">Commits</button>
          <button [class.active]="activeTab === 'files'" (click)="activeTab = 'files'">Files</button>
        </div>
        @if (activeTab === 'timeline') {
          <div class="tab-content">
            <div class="commit-log-panel">
              <app-commit-log
                [branch]="null"
                [repoPath]="repoPath"
                [refreshTick]="refreshTick"
                [jumpToBranch]="selectedBranch"
                (commitSelected)="onCommitSelected($event)">
              </app-commit-log>
            </div>
            <div class="commit-detail-panel">
              <app-commit-detail [sha]="selectedCommit"></app-commit-detail>
            </div>
          </div>
        }
        @if (activeTab === 'commits') {
          <div class="tab-content">
            <div class="commit-log-panel">
              <app-commit-log
                [branch]="selectedBranch"
                [repoPath]="repoPath"
                [refreshTick]="refreshTick"
                (commitSelected)="onCommitSelected($event)">
              </app-commit-log>
            </div>
            <div class="commit-detail-panel">
              <app-commit-detail [sha]="selectedCommit"></app-commit-detail>
            </div>
          </div>
        }
        @if (activeTab === 'files') {
          <div class="tab-content">
            <app-file-tree [ref]="selectedBranch || 'HEAD'"></app-file-tree>
          </div>
        }
      </main>
    </div>
  </div>
}
